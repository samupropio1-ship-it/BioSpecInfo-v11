<!-- Critical CSS inline (< 4KB) -->
<style>
:root{
  --g900:#1B5E20;--g800:#2E7D32;--g700:#388E3C;--g600:#43A047;--g500:#4CAF50;
  --g200:#C8E6C9;--g100:#E8F5E9;--g50:#F1F8E9;
  --text:#212121;--text2:#616161;--text3:#9E9E9E;
  --white:#fff;--bg:#fafafa;
  --err:#c62828;--warn:#e65100;
  --shadow:0 2px 8px rgba(0,0,0,.1);
  --radius:12px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--font);color:var(--text);background:var(--bg);min-height:100vh;-webkit-font-smoothing:antialiased;line-height:1.5}
#app-shell{display:flex;flex-direction:column;min-height:100vh}
.hdr{background:linear-gradient(135deg,var(--g900),var(--g700));color:#fff;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.2);min-height:56px}
.hdr-title{font-size:1.1rem;font-weight:800;letter-spacing:.5px}
.hdr-actions{display:flex;gap:6px}
.hdr-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;width:38px;height:38px;border-radius:10px;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:all .2s}
.hdr-btn:hover,.hdr-btn:focus-visible{background:rgba(255,255,255,.25);outline:2px solid #fff;outline-offset:1px}
.hdr-btn[hidden]{display:none}
#install-cta{background:#fff;color:var(--g900);font-weight:900;font-size:.85rem;padding:0 14px;width:auto;border:none}
#install-cta:hover{background:var(--g50);transform:translateY(-1px)}
#nav-wrap{background:#fff;border-bottom:1px solid var(--g200);padding:8px;overflow-x:auto;display:flex;gap:6px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
#nav-wrap::-webkit-scrollbar{display:none}
.nav-btn{flex-shrink:0;background:var(--g50);border:1px solid var(--g200);color:var(--g900);padding:8px 16px;border-radius:20px;cursor:pointer;font-weight:700;font-size:.85rem;font-family:var(--font);transition:all .2s;white-space:nowrap}
.nav-btn:hover,.nav-btn:focus-visible{background:var(--g100);transform:translateY(-1px);outline:none}
.nav-btn.active{background:var(--g900);color:#fff;border-color:var(--g900)}
#main{flex:1;padding:16px;max-width:1100px;margin:0 auto;width:100%}
.skeleton{padding:24px;background:#fff;border-radius:var(--radius)}
.skeleton-line{height:14px;background:linear-gradient(90deg,#eee 25%,#f5f5f5 50%,#eee 75%);background-size:200% 100%;animation:skel 1.5s infinite;border-radius:4px;margin:10px 0}
@keyframes skel{0%{background-position:200% 0}100%{background-position:-200% 0}}
.section-title{font-size:.75rem;font-weight:800;letter-spacing:.18em;color:var(--g900);text-transform:uppercase;padding:8px 0 14px;border-bottom:2px solid var(--g200);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.section-title::before{content:'';display:block;width:4px;height:18px;background:var(--g700);border-radius:2px}
.skip-link{position:absolute;top:-40px;left:0;background:var(--g900);color:#fff;padding:8px 16px;text-decoration:none;z-index:1000}
.skip-link:focus{top:0}
@media (max-width:600px){.hdr-title{font-size:1rem}.hdr-btn{width:34px;height:34px;font-size:1rem}}
@media (prefers-color-scheme:dark){
  :root{--bg:#0f1419;--text:#e0e0e0;--text2:#b0b0b0;--text3:#808080;--white:#1a1f24;--g50:#1f2820;--g100:#1f3326;--g200:#2d4a35}
  .nav-btn{background:#1f2820;color:#a5d6a7}
}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>

<body>

<div id="app-shell">
  <header class="hdr" role="banner">
    <h1 class="hdr-title">🧪 BioSpecInfo</h1>
    <div class="hdr-actions" role="toolbar" aria-label="Azioni rapide">
      <button id="install-cta" class="hdr-btn" aria-label="Installa l'app" hidden>📲 Installa</button>
      <button id="search-btn" class="hdr-btn" aria-label="Cerca">🔍</button>
      <button id="download-btn" class="hdr-btn" aria-label="Scarica sito">⬇️</button>
    </div>
  </header>

  <nav id="nav-wrap" role="navigation" aria-label="Sezioni principali"></nav>

  <main id="main" role="main" aria-live="polite" aria-busy="true">
    <div class="skeleton">
      <div class="section-title">🧪 Caricamento BioSpecInfo</div>
      <div class="skeleton-line" style="width:60%"></div>
      <div class="skeleton-line" style="width:90%"></div>
      <div class="skeleton-line" style="width:75%"></div>
      <div class="skeleton-line" style="width:50%"></div>
    </div>
  </main>

  <div id="toast-root" role="status" aria-live="polite"></div>
  <div id="modal-root" role="dialog" aria-modal="true" aria-hidden="true"></div>
</div>

<!-- Bootstrap inline -->
<script>
// Service Worker registration
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('./sw.js',{scope:'./'})
      .then(function(r){console.log('[SW] Registered:',r.scope);})
      .catch(function(e){console.warn('[SW] Failed:',e.message);});
  });
}
// Hash → route
if(!location.hash) location.hash = '#dashboard';
</script>
